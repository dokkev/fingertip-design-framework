{
  "schema_version": "1.0",
  "datasets": [
    {
      "adapter": "phase4k",
      "design_id": "baseline",
      "input_dir": "output/phase4_mechanical_transfer_map"
    }
  ],
  "figure": {
    "kind": "displacement_vector_atlas",
    "title": "Press here: measured sidewall displacement response",
    "basename": "displacement_vector_atlas",
    "designs": [
      "baseline"
    ],
    "mesh": "medium",
    "quantity": "raw_displacement",
    "contact_locations": [
      0.2,
      0.5,
      0.8
    ],
    "indentation_mm": 1.5,
    "interpolation": {
      "enabled": false
    },
    "color_scale": {
      "mode": "shared_symmetric",
      "center": 0.0
    },
    "panels": {
      "undeformed_mesh": true,
      "deformed_observation_boundary": true,
      "displacement_vectors": true,
      "contact_annotation": true
    },
    "theme": "blog",
    "scale": {
      "deformation": 1.0,
      "arrows": 3.0
    },
    "arrows": {
      "maximum_per_panel": 18,
      "minimum_magnitude_mm": 0.001
    },
    "export": {
      "formats": [
        "png",
        "pdf"
      ],
      "dpi": 300,
      "source_data": true,
      "manifest": true,
      "output_directory": "output/geometry_aware_figures/displacement_vector_atlas"
    }
  }
}
